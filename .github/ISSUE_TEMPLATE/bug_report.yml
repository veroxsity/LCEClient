name: Bug Report
description: File a bug report.
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true


  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

      
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
      
  - type: textarea
    id: video
    attributes:
      label: Videos
      description: If applicable, add videos to help explain your problem.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. 55a86b8
    validations:
      required: true

  - type: checkboxes
    id: build
    attributes:
      label: Build Type
      options:
        - label: Release
        - label: Debug
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: A clear and concise description of what the bug is.
    validations:
      required: false
